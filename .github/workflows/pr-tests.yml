name: PR Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore MyCancerTeam.slnx

      - name: Build
        run: dotnet build MyCancerTeam.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test MyCancerTeam.slnx --no-build --no-restore --configuration Release --verbosity normal
